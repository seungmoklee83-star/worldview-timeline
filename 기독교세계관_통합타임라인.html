<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기독교 세계관 역사 타임라인 — 8대 세계관의 전환</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f4f5f7;color:#222;font-size:13px;line-height:1.5}
a{color:inherit;text-decoration:none}
/* HEADER */
.hdr{background:linear-gradient(135deg,#1a1a2e,#2d1b4e,#4a1942);color:#fff;padding:32px 24px 24px;text-align:center}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:.5px;margin-bottom:6px}
.hdr p{font-size:12px;opacity:.75}
/* CONTROLS */
.ctrl{background:#fff;border-bottom:1px solid #e0e0e0;padding:14px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.ctrl-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px}
.ctrl-row:last-child{margin-bottom:0}
.ctrl-label{font-size:11px;font-weight:700;color:#666;margin-right:4px;min-width:50px}
/* WV PILLS */
.wv-pill{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .2s;white-space:nowrap}
.wv-pill.active,.wv-pill:hover{border-color:currentColor;opacity:1}
.wv-pill:not(.active){opacity:.65}
/* CAT BTNS */
.cat-btn{padding:4px 10px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .2s;white-space:nowrap}
.cat-btn.active{border-color:currentColor}
.cat-btn:not(.active){opacity:.5}
/* STATS */
.stats{padding:8px 20px;background:#fafafa;border-bottom:1px solid #eee;font-size:11px;color:#666;display:flex;gap:16px;align-items:center}
.stats b{color:#222}
/* TIMELINE */
.timeline{max-width:820px;margin:0 auto;padding:20px 16px 40px;position:relative}
.timeline::before{content:'';position:absolute;left:38px;top:20px;bottom:0;width:2px;background:#e0e0e0}
/* PHASE HEADER */
.phase-hdr{display:flex;align-items:center;gap:10px;margin:24px 0 12px;position:relative;z-index:1}
.phase-hdr .dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;margin-left:30px;border:3px solid #fff;box-shadow:0 0 0 2px currentColor}
.phase-hdr .label{font-size:13px;font-weight:700;padding:4px 14px;border-radius:20px;color:#fff}
/* EVENT CARD */
.entry{display:flex;gap:12px;margin-bottom:10px;position:relative}
.entry .year-col{width:56px;flex-shrink:0;text-align:right;padding-top:14px;font-weight:700;font-size:12px;color:#555}
.entry .dot-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:20px}
.entry .dot-col .edot{width:12px;height:12px;border-radius:50%;margin-top:16px;flex-shrink:0;border:2px solid #fff;box-shadow:0 0 0 2px currentColor}
.entry .dot-col .line{flex:1;width:2px;background:#e8e8e8;margin-top:2px}
.card{flex:1;background:#fff;border-radius:8px;padding:10px 13px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:3px solid transparent;cursor:pointer;transition:box-shadow .2s}
.card:hover{box-shadow:0 3px 12px rgba(0,0,0,.14)}
.card .card-top{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.cat-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.card .title{font-weight:700;font-size:13px;flex:1;min-width:120px}
.card .desc{font-size:11.5px;color:#555;margin-top:5px;line-height:1.55;display:none}
.card.open .desc{display:block}
.card .toggle{font-size:10px;color:#aaa;margin-top:4px;text-align:right}
/* WORLDVIEW INFO */
.wv-info{margin:10px 0 4px;border-radius:10px;padding:14px 18px;border-left:5px solid;font-size:12px;line-height:1.6;display:none}
.wv-info.show{display:block}
.wv-info .wi-title{font-weight:700;font-size:14px;margin-bottom:4px}
.wv-info .wi-period{opacity:.7;font-size:11px;margin-bottom:6px}
.wv-info .wi-figures{margin-top:6px;font-size:11px;opacity:.8}
.wv-info .wi-quote{margin-top:8px;font-style:italic;font-size:11.5px;opacity:.75;border-top:1px solid rgba(0,0,0,.1);padding-top:8px}
/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:#999;font-size:13px}
/* RESPONSIVE */
@media(max-width:600px){.timeline::before{left:32px}.entry .year-col{width:44px;font-size:11px}.ctrl-row{gap:4px}}
</style>
</head>

  {year:1517,era:'theism',cat:'religion',title:'루터의 95개 논제',desc:'종교개혁의 시작. 교황 권위에 도전하고 성경 중심 신앙을 주장. 기독교 유신론의 내부 분화.'},
  {year:1534,era:'theism',cat:'history',title:'영국 국교회 성립',desc:'헨리 8세의 이혼 문제로 로마 교황청과 결별. 종교와 국가 권력의 관계 재편.'},
  {year:1536,era:'theism',cat:'religion',title:'칼뱅 《기독교 강요》',desc:'개혁 신학 체계화. 하나님의 절대 주권, 예정론, 말씀 중심 예배. 개혁교회의 신학적 기초.'},
  {year:1543,era:'theism',cat:'science',title:'코페르니쿠스 지동설',desc:'태양 중심 우주론. 지구 중심적 기독교 우주관에 균열. 과학혁명의 시작점.'},
  {year:1545,era:'theism',cat:'religion',title:'트리엔트 공의회',desc:'가톨릭 반종교개혁. 교리 재정비, 예수회 설립. 기독교 유신론 내의 가톨릭적 응답.'},
  {year:1572,era:'theism',cat:'history',title:'성 바르톨로메오 학살',desc:'프랑스에서 가톨릭이 위그노 3만여 명 학살. 종교적 확신이 폭력으로 귀결된 비극.'},
  {year:1592,era:'theism',cat:'korea',title:'임진왜란',desc:'조선 성리학적 세계관의 첫 충격. 7년 전쟁 후 사회 질서 혼란. 조선 사회와 사상의 재편 계기.'},
  {year:1600,era:'theism',cat:'history',title:'브루노 화형',desc:'무한 우주론·지동설 지지로 화형. 과학적 진리와 교회 권위의 충돌을 상징하는 사건.'},
  {year:1605,era:'theism',cat:'art',title:'세르반테스 《돈키호테》',desc:'중세 기사도(종교적 이상)의 붕괴와 현실의 충돌. 유신론 세계관 해체의 문학적 예고.'},
  {year:1610,era:'theism',cat:'science',title:'갈릴레오 망원경 관측',desc:'목성의 위성 발견. 지동설의 관측 증거. 성경 해석과 과학 관측 사이의 긴장 표면화.'},
  {year:1618,era:'theism',cat:'history',title:'30년 전쟁',desc:'유럽 최대의 종교전쟁. 1648년 베스트팔렌 조약으로 종결 후 교회의 정치적 권위 급격히 쇠퇴.'},
  {year:1636,era:'theism',cat:'korea',title:'병자호란',desc:'청나라에 패배, 인조의 삼전도 굴욕. 성리학적 명분론과 현실의 괴리. 조선의 세계관적 위기.'},
  {year:64,era:'theism',cat:'history',title:'네로 황제의 기독교 박해',desc:'로마 대화재 후 기독교인들에게 누명. 베드로·바울 순교 추정 시기. 최초 조직적 박해. 교회가 피로써 세워지다.'},
  {year:70,era:'theism',cat:'history',title:'예루살렘 멸망과 성전 파괴',desc:'로마군 티투스의 예루살렘 함락. 성전 완전 파괴. 유대교-기독교 분리 가속화. 사도시대 교회의 결정적 전환점.'},
  {year:107,era:'theism',cat:'religion',title:'이그나티우스 순교',desc:'안티오키아 주교 이그나티우스, 로마에서 맹수에 의해 순교. "나는 하나님의 밀이다." 순교 신학의 원형.'},
  {year:155,era:'theism',cat:'religion',title:'폴리갑 순교',desc:'스미르나 주교 폴리갑. "86년 동안 그분을 섬겨왔는데, 어찌 그분을 욕되게 할 수 있겠소?" 초대교회 신앙의 증거.'},
  {year:313,era:'theism',cat:'history',title:'밀라노 칙령 (기독교 공인)',desc:'콘스탄티누스 황제의 종교자유령. 기독교 박해 종식. 제국 종교화의 시작. 교회와 국가 관계의 근본적 전환.'},
  {year:381,era:'theism',cat:'religion',title:'콘스탄티노플 공의회 (삼위일체 확정)',desc:'삼위일체 교리 최종 확정. 아리우스파 이단 정죄. 성령의 신성 공식 선언. 니케아 신경 완성.'},
  {year:397,era:'theism',cat:'religion',title:'카르타고 공의회 (신약 정경 확정)',desc:'27권 신약성경 정경 목록 공식 채택. 구약 39권과 함께 성경 66권 체계 확립. 무엇이 하나님의 말씀인가 결정.'},
  {year:590,era:'theism',cat:'religion',title:'교황 그레고리 1세 즉위',desc:'"종의 종" 자처하며 중세 교황제도 기초 확립. 선교 열정과 교회 행정 정비. 앵글로색슨 선교 파송.'},
  {year:635,era:'theism',cat:'korea',title:'경교, 당나라 도착·신라 전래 가능성',desc:'네스토리우스파 선교사 알로펜, 당나라 도착. 638년 조정 공인. 당나라와 긴밀했던 신라를 통한 한반도 전래 가능성 추측. 불국사 돌십자가 등 증거.'},
  {year:781,era:'theism',cat:'korea',title:'대진경교유행중국비 건립',desc:'당나라 장안에 경교 전래 기념비 건립. 로마(대진)의 기독교(경교)가 중국에서 유행함을 기념. 1625년 발견. 한국교회사의 뿌리를 묻게 하는 사건.'},
  {year:800,era:'theism',cat:'history',title:'샤를마뉴 대관식',desc:'교황 레오 3세가 샤를마뉴에게 황제관 수여. 서유럽 기독교 문명 형성의 기점. 교황권과 황권의 긴장 관계 시작.'},
  {year:845,era:'theism',cat:'korea',title:'회창멸법: 경교 박해와 쇠퇴',desc:'열렬한 도교 신자 무종의 외래종교 탄압령. 경교승 수백 명 환속. 4-7만 교도 개종·도주. 주로 지식인·관료 중심으로 민중 기반 없어 쇠퇴.'},
  {year:1309,era:'theism',cat:'history',title:'아비뇽 유수 (교황청 이전)',desc:'1309-1377년 교황청이 프랑스 아비뇽으로 이전. 교황권의 프랑스 왕권 종속. 교황의 권위 실추. 교회 개혁의 필요성 절감.'},
  {year:1378,era:'theism',cat:'history',title:'서방 교회 대분열 (3명의 교황)',desc:'1378-1417년 교황 2-3명이 동시 존재. 로마·아비뇽·피사 각각 교황 선출. 교황제도 신뢰 심각하게 손상. 종교개혁의 배경.'},
  {year:1415,era:'theism',cat:'religion',title:'얀 후스 화형 (콘스탄츠 공의회)',desc:'보헤미아 종교개혁자 얀 후스, 이단 정죄 화형. 성경 권위와 교회 부패 비판. "진리는 승리한다." 루터의 선구자.'},
  {year:1521,era:'theism',cat:'religion',title:'보름스 제국의회 (루터 입장 고수)',desc:'"여기 내가 서 있소, 달리 할 수 없소, 하나님이여 도우소서." 루터, 황제 앞에서 입장 취소 거부. 종교개혁의 돌이킬 수 없는 확립.'},
  {year:1627,era:'theism',cat:'korea',title:'벨트브레(박연), 조선 최초 서양인 귀화',desc:'네덜란드 개신교 신자 벨트브레, 경주 앞바다 표류 입국. 병자호란 참전. 조선 귀화 최초 서양인. 조선에 들어온 최초의 개신교 신자로 추정.'},
  {year:1645,era:'theism',cat:'korea',title:'소현세자, 아담 샬과 만남',desc:'병자호란 포로로 청에 억류된 소현세자가 예수회 독일 신부 아담 샬과 교류. 귀국 70일 만에 의문사. 가톨릭의 위로부터의 선교 전략 상징적 사건.'},
  {year:1620,era:'deism',cat:'philosophy',title:'베이컨 《신기관》',desc:'귀납적 방법론 제시. 신학 대신 자연 탐구를 지식의 근거로. 근대 과학 방법론의 선언.'},
  {year:1637,era:'deism',cat:'philosophy',title:'데카르트 《방법서설》',desc:'"코기토 에르고 숨(나는 생각한다, 고로 존재한다)." 이성 중심 철학, 신학으로부터 독립 선언.'},
  {year:1648,era:'deism',cat:'history',title:'베스트팔렌 조약',desc:'30년 전쟁 종결. 국가 주권 확립, 종교의 정치적 절대 권위 약화. 세속 근대 국가 질서 시작.'},
  {year:1651,era:'deism',cat:'philosophy',title:'홉스 《리바이어던》',desc:'사회계약론. 국가 정당성을 신이 아닌 인간 합의에서 찾음. 세속 정치철학의 기초.'},
  {year:1601,era:'deism',cat:'art',title:'카라바조 — 바로크 미술의 탄생',desc:'극적 명암 대비(키아로스쿠로). 성경 장면의 생생한 현실감. 이상화 대신 민중의 얼굴로 그린 성인들. 종교개혁·반종교개혁의 긴장 속에서 신앙을 극적으로 호소한 미술.'},
  {year:1642,era:'deism',cat:'art',title:'렘브란트 《야경》 — 바로크의 심화',desc:'빛과 어둠의 철학. 인물의 내면을 비추는 신비한 빛. 성경적 주제에서 인간의 고뇌와 존엄으로. 이신론 시대, 신은 멀어졌지만 빛은 남아 있다.'},
  {year:1667,era:'deism',cat:'art',title:'밀턴 《실낙원》',desc:'기독교 세계관 속 인간의 타락과 자유를 탐구. 신학적 유신론과 이성적 인간 사이의 긴장.'},
  {year:1717,era:'deism',cat:'art',title:'와토 《키테라 섬으로의 순례》 — 로코코 탄생',desc:'화려한 색채, 우아한 유희, 귀족의 쾌락. 종교적 주제에서 세속적 향락으로. 신이 물러난 자리에 인간의 감각이 들어서다. 계몽주의 귀족 문화의 미적 표현.'},
  {year:1670,era:'deism',cat:'philosophy',title:'스피노자 《신학정치론》',desc:'성경의 이성적 비평. "신=자연"(Deus sive Natura). 범신론적 이신론으로 기독교 계시를 해체.'},
  {year:1687,era:'deism',cat:'science',title:'뉴턴 《프린키피아》',desc:'만유인력 법칙. 우주를 수학적 법칙이 지배하는 기계로 묘사. 이신론의 과학적 토대 제공.'},
  {year:1689,era:'deism',cat:'history',title:'영국 명예혁명·관용법',desc:'의회 주권 확립, 종교적 관용 법제화. 신앙을 이성과 관용의 틀 안에서 재편.'},
  {year:1690,era:'deism',cat:'philosophy',title:'로크 《인간오성론》',desc:'경험론. 지식의 근거를 신의 계시가 아닌 감각 경험에서 찾음. 계몽주의 인식론의 기초.'},
  {year:1726,era:'deism',cat:'art',title:'스위프트 《걸리버 여행기》',desc:'인간 이성과 종교 독단에 대한 신랄한 풍자. 계몽주의적 유머로 전통적 세계관에 의문 제기.'},
  {year:1739,era:'deism',cat:'philosophy',title:'흄 《인간 본성론》',desc:'인과율 회의. 기적·설계 논증 해체 시도. 이신론마저 비판하며 자연주의의 선구자가 됨.'},
  {year:1748,era:'deism',cat:'philosophy',title:'몽테스키외 《법의 정신》',desc:'삼권분립 이론. 법의 근거를 신이 아닌 자연과 이성에서 찾음. 근대 민주주의 이론의 토대.'},
  {year:1751,era:'deism',cat:'philosophy',title:'《백과전서》 편찬 시작',desc:'디드로·달랑베르 편집. 지식 체계의 세속화. 종교적 권위를 이성의 권위로 대체하는 상징.'},
  {year:1755,era:'deism',cat:'history',title:'리스본 대지진',desc:'3만~6만 명 사망. "선한 하나님이 이런 일을 허용하는가?" 섭리론·신정론에 대한 유럽의 회의 심화.'},
  {year:1759,era:'deism',cat:'art',title:'볼테르 《캉디드》',desc:'"최선의 세계"라는 낙관적 섭리론 풍자. 현실의 부조리로 기독교적 세계관 조롱.'},
  {year:1762,era:'deism',cat:'philosophy',title:'루소 《사회계약론》',desc:'"일반의지"와 세속 도덕 모색. 자연종교 제안. 계몽주의적 정치·종교 이상의 결정판.'},
  {year:1770,era:'deism',cat:'philosophy',title:'돌바크 《자연의 체계》',desc:'체계적 무신론·유물론. 신·영혼·자유의지 전면 부정. 자연주의로 가는 결정적 한 걸음.'},
  {year:1776,era:'deism',cat:'history',title:'미국 독립선언',desc:'"모든 사람은 평등하게 창조되었다." 계몽주의 이신론적 정치 이상의 현실화.'},
  {year:1781,era:'deism',cat:'philosophy',title:'칸트 《순수이성비판》',desc:'이성으로 신을 증명하는 것은 불가능. 신학과 과학의 영역을 분리. 근대 철학의 전환점.'},
  {year:1784,era:'deism',cat:'korea',title:'이승훈, 천주교 세례 (북경)',desc:'한국 최초의 자발적 천주교 수용. 서학(西學)의 유입. 조선 성리학 세계관과의 본격 충돌 시작.'},
  {year:1789,era:'deism',cat:'history',title:'프랑스 대혁명',desc:'교회 재산 몰수, 성직자 추방. 이성의 여신 숭배. 기독교 유신론 세계관의 정치적 해체.'},
  {year:1794,era:'deism',cat:'religion',title:'페인 《이성의 시대》',desc:'기독교 계시 전면 비판. "이성이 유일한 교회다." 이신론의 대중적 선언문.'},
  {year:1801,era:'deism',cat:'korea',title:'신유박해',desc:'정순왕후의 천주교 탄압. 이승훈·권철신 등 처형. 조선에서 천주교 수용이 사회적 갈등으로.'},
  {year:1653,era:'deism',cat:'korea',title:'하멜, 제주도 표착',desc:'네덜란드 동인도회사 선원 하멜 일행 36명, 제주도에 표착. 13년 억류 후 탈출하여 《하멜 표류기》 저술. 조선 최초의 서양 체류 기록. 당시 조선의 쇄국 분위기를 서방에 알린 사건.'},
  {year:1675,era:'deism',cat:'religion',title:'슈페너, 경건주의 운동 시작',desc:'《경건한 소원》(Pia Desideria) 출판. 교리 중심 정통주의에 반발, 삶의 변화·성경 묵상·소그룹 운동 강조. 이신론 시대에 교회 내부 갱신을 시도한 대표적 흐름.'},
  {year:1734,era:'deism',cat:'religion',title:'대각성운동 (에드워즈·휫필드)',desc:'조나단 에드워즈의 노샘프턴 부흥(1734), 조지 휫필드의 순회 전도(1739~). 이성·계몽 시대에 감성·회심 중심 복음주의 부흥. 미국 개신교 형성의 뿌리.'},
  {year:1780,era:'deism',cat:'religion',title:'주일학교 운동 (로버트 레익스)',desc:'영국 글로스터에서 로버트 레익스가 공장 아동 대상 주일학교 시작. 교육과 복음 결합. 산업혁명 시대 빈민 아동 계몽의 기독교적 응답.'},
  {year:1785,era:'deism',cat:'korea',title:'을사추조적발사건',desc:'한양 반촌에서 명례방 집회 발각. 김범우의 집에서 이승훈·정약전·정약용 등 모여 천주교 신앙 실천 중 적발. 조선 최초의 천주교 신앙 모임 탄로. 이후 천주교 박해의 서막.'},
  {year:1791,era:'deism',cat:'korea',title:'신해박해 (진산사건)',desc:'윤지충이 모친 제사를 거부하고 신주를 소각한 진산사건. 유교적 조상제사와 천주교 신앙의 충돌. 조선 최초 천주교 순교자(윤지충·권상연). 이후 박해의 법적 근거 확립.'},
  {year:1802,era:'naturalism',cat:'religion',title:'페일리 《자연신학》',desc:'"시계를 발견하면 시계 제작자를 알 수 있다." 다윈 이전 마지막 유신론적 자연신학의 대표작.'},
  {year:1807,era:'naturalism',cat:'philosophy',title:'헤겔 《정신현상학》',desc:'절대정신의 역사적 전개. 기독교를 역사 발전의 한 단계로 위치시킴. 변증법적 역사관.'},
  {year:1830,era:'naturalism',cat:'science',title:'라이엘 《지질학 원리》',desc:'동일과정설. 지구 나이가 수십억 년. 창세기적 창조론에 지질학적 균열을 가져옴.'},
  {year:1835,era:'naturalism',cat:'religion',title:'슈트라우스 《예수의 생애》',desc:'역사비평학 적용. 복음서를 신화로 분석. 고등비평학의 출발. 성경의 역사적 권위 도전.'},
  {year:1839,era:'naturalism',cat:'korea',title:'기해박해',desc:'앵베르 등 프랑스 선교사 처형. 수백 명의 조선 천주교인 순교. 한국 초기 순교의 역사.'},
  {year:1841,era:'naturalism',cat:'philosophy',title:'포이어바흐 《기독교의 본질》',desc:'"신은 인간 본성의 투영." 신학을 인간학으로 완전 환원. 마르크스·엥겔스에 결정적 영향.'},
  {year:1844,era:'naturalism',cat:'philosophy',title:'키에르케고르 《불안의 개념》',desc:'헤겔 이성주의에 반발. "주체적 진리", 신앙의 도약. 불안을 인간 실존의 핵심으로 직시.'},
  {year:1848,era:'naturalism',cat:'history',title:'마르크스·엥겔스 《공산당 선언》',desc:'종교는 인민의 아편. 유물론적 역사관. 계급 투쟁이 역사의 동력. 초월적 의미 전면 부정.'},
  {year:1784,era:'naturalism',cat:'art',title:'다비드 《호라티우스의 맹세》 — 신고전주의',desc:'이성·의무·조국. 종교 대신 시민 덕목을 미술의 주제로. 고대 그리스·로마로의 회귀. 프랑스 혁명의 미적 언어. 신학 없는 도덕의 조형적 선언.'},
  {year:1819,era:'naturalism',cat:'art',title:'제리코 《메두사의 뗏목》 — 낭만주의',desc:'이성에 맞선 감정·격정·공포. 난파선 생존자들의 절규. 신도 이성도 구하지 못한 인간의 비극. 낭만주의가 자연주의적 현실의 어두운 면을 직시하다.'},
  {year:1830,era:'naturalism',cat:'art',title:'들라크루아 《민중을 이끄는 자유의 여신》 — 낭만주의 절정',desc:'혁명의 에너지를 색채와 동세로. 알레고리적 여신이 실제 민중 속으로. 감정·민족·자유가 신앙을 대체하는 새 이상으로 등장.'},
  {year:1851,era:'naturalism',cat:'art',title:'멜빌 《모비딕》',desc:'거대한 고래=신의 침묵·우주적 무관심. 자연의 냉혹함 앞에서 인간 의지의 비극적 도전.'},
  {year:1857,era:'naturalism',cat:'art',title:'밀레 《이삭 줍는 여인들》 — 사실주의',desc:'신화·성경 대신 노동하는 농민. 일상의 고단함이 예술의 주제로. 쿠르베와 함께 "눈에 보이는 것만 그린다"는 사실주의 선언. 자연주의 철학의 회화적 실천.'},
  {year:1874,era:'naturalism',cat:'art',title:'제1회 인상주의 전시회 (모네·르누아르·드가)',desc:'빛의 순간적 인상 포착. "사물의 본질" 대신 "지금 내 눈에 보이는 것". 카메라의 등장 이후 회화의 자기 정체성 찾기. 객관적 진리 대신 주관적 지각이 예술의 기준이 되다.'},
  {year:1859,era:'naturalism',cat:'science',title:'다윈 《종의 기원》',desc:'자연선택으로 생명의 다양성 설명. 목적 없는 과정. 기독교 창조론 해체의 결정타.'},
  {year:1862,era:'naturalism',cat:'art',title:'위고 《레미제라블》',desc:'제도 종교 비판. 신학 없는 인도주의 윤리 탐구. 자연주의적 인간 연대의 가능성 탐색.'},
  {year:1865,era:'naturalism',cat:'science',title:'멘델 유전법칙',desc:'유전의 물질적 기반 발견. 자연주의적 생물학 강화. 생명을 법칙으로 설명하는 토대.'},
  {year:1866,era:'naturalism',cat:'korea',title:'병인박해·병인양요',desc:'8천여 명의 조선 천주교인 처형. 프랑스 함대 침공. 동서 세계관 충돌의 군사적 표현.'},
  {year:1867,era:'naturalism',cat:'history',title:'마르크스 《자본론》',desc:'경제법칙으로 역사 설명. 종교의 사회과학적 대체. 자본주의 분석과 공산주의 혁명 이론.'},
  {year:1871,era:'naturalism',cat:'science',title:'다윈 《인간의 유래》',desc:'인간도 진화의 산물. 인간의 특별한 지위 부정. 자연주의의 인간론적 완성.'},
  {year:1876,era:'naturalism',cat:'korea',title:'강화도 조약',desc:'일본과의 불평등 조약. 서양식 근대화의 압력. 조선의 성리학적 세계관이 도전받기 시작.'},
  {year:1878,era:'naturalism',cat:'religion',title:'웰하우젠 문서설 (JEDP)',desc:'모세5경의 다중 출처 주장. 성경 무오류설에 학문적 도전. 고등비평학의 절정.'},
  {year:1884,era:'naturalism',cat:'korea',title:'언더우드·아펜젤러 입국',desc:'개신교 선교 공식 시작. 교육·의료 사업과 복음. 한국 근대화와 기독교의 결합.'},
  {year:1792,era:'naturalism',cat:'religion',title:'윌리엄 캐리, 근대 선교운동 시작',desc:'영국 침례교 목사 캐리, 인도 선교 출발. 《이교도 개종을 위한 수단 사용의 의무》 출판. 근대 개신교 선교운동의 출발점. "하나님께 위대한 일을 기대하라, 하나님을 위해 위대한 일을 시도하라."'},
  {year:1807,era:'naturalism',cat:'religion',title:'노예무역 폐지 (윌버포스)',desc:'영국 의회에서 윌리엄 윌버포스의 주도로 노예무역 폐지법 통과. 복음주의 신앙이 사회 변혁으로 이어진 대표 사례. 과학적 인종주의에 맞선 기독교 양심의 승리.'},
  {year:1832,era:'naturalism',cat:'korea',title:'귀츨라프, 조선 해안 방문',desc:'독일 선교사 귀츨라프, 영국 동인도회사 선박을 타고 황해도·충청도 해안 방문. 조선인에게 한문 성경 배포 시도. 최초의 개신교 선교사 조선 방문 기록.'},
  {year:1845,era:'naturalism',cat:'korea',title:'김대건 신부 서품',desc:'한국 최초의 가톨릭 사제 김대건 안드레아, 상해에서 사제 서품. 1846년 귀국 후 체포되어 25세로 순교. 한국 천주교의 상징적 순교자.'},
  {year:1866,era:'naturalism',cat:'korea',title:'토마스 선교사, 대동강에서 순교',desc:'웨일즈 출신 로버트 토마스 선교사, 미국 상선 제너럴셔먼호를 타고 평양 대동강에서 성경 배포 시도 중 조선 수군에 의해 참수. 그가 던진 성경이 후일 평양 교회 설립에 기여했다는 전설.'},
  {year:1869,era:'naturalism',cat:'religion',title:'제1차 바티칸 공의회',desc:'교황 무오류설 선언. 과학·자유주의·근대주의에 맞선 가톨릭의 보수적 응답. 교황권 강화. 이후 현대주의 논쟁의 씨앗.'},
  {year:1879,era:'naturalism',cat:'korea',title:'의주 청년들, 만주에서 세례',desc:'이응찬·백홍준 등 의주 청년들이 존 로스 선교사에게 세례를 받고 성경번역 조사로 활동. 한국 개신교 토착화의 첫 사례. 민중 스스로가 이끈 선교의 시작.'},
  {year:1882,era:'naturalism',cat:'korea',title:'존 로스 역 《예수성교누가복음》 출간',desc:'스코틀랜드 선교사 존 로스, 조선인 조사들과 함께 번역한 최초의 한글 신약성경 간행. 의주 청년들의 협력. 선교사 입국 전 자생적 성경 보급. 한국 교회의 독특한 자생적 토대.'},
  {year:1882,era:'naturalism',cat:'korea',title:'조미수호통상조약',desc:'미국과 조선의 최초 근대적 조약 체결. 서양과의 공식 외교 개시. 선교사 입국의 제도적 기반 마련. 근대 문명과 기독교의 공식적 접촉 시작.'},
  {year:1883,era:'naturalism',cat:'korea',title:'이수정, 일본에서 세례·마가복음 번역',desc:'조선 유학생 이수정, 일본에서 야스가와에게 세례. 로마자 표기 한글 마가복음 번역. 아펜젤러·언더우드가 이 성경을 갖고 입국. 일본을 경유한 또 다른 선교 경로.'},
  {year:1885,era:'naturalism',cat:'korea',title:'광혜원(제중원) 개원',desc:'미국 북장로회 선교사 알렌, 갑신정변 부상자를 치료한 공로로 고종의 허락 받아 설립. 한국 최초의 서양식 병원. 의료 선교의 출발. 이후 세브란스병원으로 발전.'},
  {year:1886,era:'naturalism',cat:'korea',title:'배재학당·이화학당 설립',desc:'아펜젤러, 배재학당(남학교) 개교. 스크랜턴 부인, 이화학당(여학교) 개교. 교육을 통한 선교. 근대적 남녀 교육의 시작. 이후 배재대·이화여대로 발전.'},
  {year:1887,era:'naturalism',cat:'korea',title:'새문안교회 설립',desc:'언더우드 선교사, 한국 최초의 개신교 교회 새문안교회 설립. 14명으로 시작. 한국 장로교의 모교회. 선교사에 의한 교회 설립에서 자생적 한국 교회 형성으로 전환점.'},
  {year:1893,era:'naturalism',cat:'korea',title:'교계예양 협정',desc:'장로교(미국 북·남장로회, 캐나다, 호주)·감리교(미국 북·남감리회) 선교사들이 지역 분할 협정. 선교지 중복 방지. 한국 개신교 협력과 교단 구분의 역사적 기초.'},
  {year:1882,era:'nihilism',cat:'philosophy',title:'니체 "신은 죽었다" 《즐거운 학문》',desc:'기독교 도덕 체계의 붕괴 선언. "우리가 신을 죽였다." 자연주의의 귀결로서 허무주의 선언.'},
  {year:1883,era:'nihilism',cat:'art',title:'니체 《차라투스트라는 이렇게 말했다》',desc:'초인(Übermensch) 이상 제시. 허무주의를 넘으려는 첫 시도. 그러나 니체 자신은 정신병원에서 생을 마침.'},
  {year:1889,era:'nihilism',cat:'art',title:'반 고흐 《별이 빛나는 밤》 — 후기인상주의',desc:'소용돌이치는 하늘. 빛에 대한 격렬한 갈망. 귀 자른 이후 정신병원에서 그린 작품. 신을 잃은 시대에 빛을 향한 절규. 고흐의 그림은 허무주의의 고통 속 영적 갈망의 시각화.'},
  {year:1893,era:'nihilism',cat:'art',title:'뭉크 《절규》 — 표현주의의 선구',desc:'불타는 하늘 아래 형체 없는 공포의 외침. "나는 자연을 관통하는 무한한 비명을 느꼈다." 이성도 신앙도 사라진 시대, 존재 자체의 불안을 최초로 회화로 표출.'},
  {year:1907,era:'nihilism',cat:'art',title:'피카소 《아비뇽의 처녀들》 — 큐비즘 탄생',desc:'하나의 시점 대신 동시에 여러 각도. 형태의 해체. "진리는 하나"라는 관념 자체를 화폭에서 해체. 허무주의의 인식론이 회화 언어를 뿌리부터 바꾸다.'},
  {year:1924,era:'nihilism',cat:'art',title:'브르통 《초현실주의 선언》 — 무의식의 미술',desc:'프로이트 영향. 꿈·무의식·욕망을 화폭으로. 달리·마그리트·에른스트. 이성적 현실의 이면에 더 깊은 비이성적 현실이 있다. 허무주의 시대의 예술적 탈출구.'},
  {year:1887,era:'nihilism',cat:'philosophy',title:'니체 《도덕의 계보》',desc:'기독교 도덕 = "노예 도덕". 힘에의 의지. 모든 가치의 재평가 요청. 허무주의의 철학적 완성.'},
  {year:1895,era:'nihilism',cat:'korea',title:'을미사변 (명성황후 시해)',desc:'일본 낭인들의 조선 왕비 시해. 국권 침탈의 노골화. 조선의 자존심과 성리학적 질서의 붕괴.'},
  {year:1900,era:'nihilism',cat:'philosophy',title:'프로이트 《꿈의 해석》',desc:'의식은 무의식 충동의 표면. 이성·자아·자유의지 해체. 허무주의의 심리학적 심화.'},
  {year:1905,era:'nihilism',cat:'science',title:'아인슈타인 특수상대성이론',desc:'절대 시공간의 붕괴. 과학적 상대성이 문화적 상대주의로 오용됨.'},
  {year:1905,era:'nihilism',cat:'korea',title:'을사늑약',desc:'대한제국 외교권 박탈. 보호국으로 전락. 5조약에 반발한 민영환 자결.'},
  {year:1907,era:'nihilism',cat:'korea',title:'평양 대부흥운동',desc:'성령 부흥의 불길. 공개 회개와 기도. 한국 기독교의 독자적 영성 형성. 자연주의에 맞선 영적 대각성.'},
  {year:1910,era:'nihilism',cat:'korea',title:'한일합방',desc:'대한제국 멸망. 조선총독부 통치 시작. 식민지 지배의 시작. 허무주의적 절망과 저항의 동시 존재.'},
  {year:1912,era:'nihilism',cat:'art',title:'카프카 소설 집필 시작',desc:'《변신》《심판》《성》— 신 없는 세계의 부조리. 관료적 불가해성. 무의미한 죄책감의 문학화.'},
  {year:1913,era:'nihilism',cat:'philosophy',title:'프로이트 《토템과 터부》',desc:'종교를 집단적 신경증·오이디푸스적 환상으로. 허무주의의 심리학적 완성.'},
  {year:1914,era:'nihilism',cat:'history',title:'제1차 세계대전',desc:'기독교 문명의 자기 파괴. 이성과 과학이 대량 학살의 도구로. 계몽주의 낙관론의 완전한 붕괴.'},
  {year:1917,era:'nihilism',cat:'history',title:'러시아 혁명',desc:'무신론 공산주의 국가 수립. 종교는 반역사적 환상. 체계적 교회 탄압 시작.'},
  {year:1917,era:'nihilism',cat:'art',title:'뒤샹 《샘》 (Fountain)',desc:'소변기를 예술 작품으로. 예술의 의미·전통 해체. 허무주의 예술의 상징. 다다이즘.'},
  {year:1919,era:'nihilism',cat:'korea',title:'3.1 운동',desc:'민족자결 선언. 기독교·천도교·불교 연합. 33인의 독립선언. 비폭력 만세운동.'},
  {year:1919,era:'nihilism',cat:'religion',title:'바르트 《로마서 강해》',desc:'자유주의 신학 정면 비판. "하나님은 완전히 다른 분." 신정통주의의 시작. 허무주의 시대의 신학적 응전.'},
  {year:1922,era:'nihilism',cat:'art',title:'T.S. 엘리엇 《황무지》',desc:'"공허한 사람들." 의미가 부서진 현대 문명의 파편. 전통적 의미 체계 붕괴의 시적 기록.'},
  {year:1927,era:'nihilism',cat:'philosophy',title:'하이데거 《존재와 시간》',desc:'현존재(Dasein), 불안, 죽음을 향한 존재. 무신론적 실존주의의 철학적 기초.'},
  {year:1927,era:'nihilism',cat:'science',title:'하이젠베르크 불확정성 원리',desc:'결정론적 우주관에 균열. 관찰자가 현실에 영향을 미침. 지식의 근본적 한계.'},
  {year:1929,era:'nihilism',cat:'history',title:'세계 대공황',desc:'자본주의·진보에 대한 신뢰 붕괴. 허무주의 감정의 대중화. 극단주의 이데올로기 확산 배경.'},
  {year:1933,era:'nihilism',cat:'history',title:'나치즘 등장 (히틀러 집권)',desc:'니체의 힘의 의지 왜곡·이용. 인간 존엄성 말살. 허무주의의 정치적 귀결이 드러남.'},
  {year:1901,era:'nihilism',cat:'korea',title:'평양신학교 설립',desc:'마포삼열(마펫) 선교사 주도로 설립. 한국인 목회자 양성의 체계적 시작. 이후 1907년 독노회와 함께 한국 장로교 자립의 핵심 기관으로 성장.'},
  {year:1903,era:'nihilism',cat:'korea',title:'원산 부흥운동',desc:'캐나다 선교사 하디(R.A. Hardie)의 공개 회개로 촉발. 한국 최초의 근대적 부흥운동. 자신의 실패와 교만을 고백하는 선교사의 회개가 한국인에게 성령의 불꽃을 옮기다.'},
  {year:1906,era:'nihilism',cat:'religion',title:'아주사 부흥운동',desc:'미국 로스앤젤레스 아주사 가(街). 흑인 설교자 윌리엄 시모어 인도. 방언·치유 동반한 부흥. 세계 오순절 운동의 기점. 한국 평양 대부흥과 같은 시기 동시 발생.'},
  {year:1907,era:'nihilism',cat:'korea',title:'평양 대부흥과 독노회 창립',desc:'1월 평양 장대현교회 대부흥: 이길함 선교사 집회 중 길선주 장로 공개 회개로 촉발. 전국 확산. 9월 독노회(獨老會) 창립, 7명의 첫 한국인 목사 안수(길선주·한석진 등). 이기풍 목사 제주 선교 파송. 한국 교회 자립·자치·자전의 시작.'},
  {year:1909,era:'nihilism',cat:'korea',title:'백만인 구령운동',desc:'한일합방 직전, 교회 전체가 1백만 명 전도 목표 설정. 실제로 대규모 전도 진행. 나라를 잃기 직전 교회가 민족을 품은 운동. 일제강점에 맞선 영적 저항.'},
  {year:1910,era:'nihilism',cat:'religion',title:'에딘버러 세계선교대회',desc:'세계 각국 1,200여 선교사 대표 참가. 현대 에큐메니칼 운동의 출발점. "이 세대 안에 세계 복음화"를 목표로. 한국 교회도 주목받는 선교의 열매로 소개됨.'},
  {year:1912,era:'nihilism',cat:'korea',title:'조선예수교장로회 총회 창립·중국선교 파송',desc:'장로교 총회 창립. 박태로·사병순·김영훈 3명을 중국 산동성 선교사로 파송. 식민지 한국 교회가 선교사를 파송하는 세계 선교사(史)의 이례적 사건.'},
  {year:1938,era:'existentialism',cat:'art',title:'사르트르 《구토》',desc:'존재의 우연성·부조리 체험. 아무 이유 없이 던져진 존재. 실존주의 소설의 효시.'},
  {year:1939,era:'existentialism',cat:'history',title:'제2차 세계대전·홀로코스트',desc:'"아우슈비츠 이후 시를 쓸 수 있는가?" 신정론 문제 극한화. 실존주의 급부상의 역사적 배경.'},
  {year:1942,era:'existentialism',cat:'art',title:'카뮈 《이방인》·《시지프 신화》',desc:'부조리(absurdity)에 항거. "시지프를 행복한 인간으로 상상해야 한다." 반항하는 인간.'},
  {year:1943,era:'existentialism',cat:'philosophy',title:'사르트르 《존재와 무》',desc:'"존재가 본질을 선행한다." 신 없는 세계에서 인간이 스스로 본질을 창조해야 한다.'},
  {year:1945,era:'existentialism',cat:'history',title:'2차 세계대전 종전·원폭 투하',desc:'인류의 자기 파괴 능력 확인. 핵전쟁 공포. 실존적 불안이 사회 전반으로 확산.'},
  {year:1945,era:'existentialism',cat:'korea',title:'광복 (해방)',desc:'일제강점 35년 종식. 그러나 분단의 씨앗. 새로운 세계관 모색의 시작.'},
  {year:1946,era:'existentialism',cat:'philosophy',title:'사르트르 《실존주의는 휴머니즘이다》',desc:'신 없는 자유·책임·가치 창조. 무신론적 실존주의의 대중 선언. 파리 강연 후 유럽 전역으로 확산.'},
  {year:1947,era:'existentialism',cat:'art',title:'카뮈 《페스트》',desc:'폐쇄된 도시 오랑 = 신 없는 우주의 상징. 부조리에도 연대하는 인간이 진정한 인간.'},
  {year:1947,era:'existentialism',cat:'art',title:'잭슨 폴록, 액션 페인팅 — 추상표현주의',desc:'캔버스를 바닥에 놓고 물감을 흩뿌림. 결과물보다 행위 자체가 예술. 사르트르의 "실존이 본질에 선행"의 회화적 실천. 자아의 흔적이 곧 예술. 전후 미국이 세계 미술의 중심으로.'},
  {year:1956,era:'existentialism',cat:'art',title:'마크 로스코, 색면 추상 — 실존의 숭고',desc:'거대한 색의 장. 관람자를 감싸는 진동하는 색채. "나는 종교적 예술을 그린다." 신 없는 시대의 숭고(Sublime). 실존적 고독과 초월에 대한 갈망을 색으로.'},
  {year:1948,era:'existentialism',cat:'korea',title:'대한민국 정부 수립',desc:'민주공화국 탄생. 그러나 분단 고착화. 이념 대립의 씨앗.'},
  {year:1950,era:'existentialism',cat:'korea',title:'한국전쟁',desc:'이념 대립의 참상. 실존적 부조리의 극단적 경험. 전쟁 중 기독교 신앙 급성장.'},
  {year:1953,era:'existentialism',cat:'art',title:'베케트 《고도를 기다리며》',desc:'오지 않는 고도 = 부재하는 신·의미. 허무주의적 기다림을 고통스럽도록 생생하게 무대화.'},
  {year:1954,era:'existentialism',cat:'history',title:'마틴 루터 킹, 민권운동 시작',desc:'기독교 신앙에 기반한 사회 정의 운동. 유신론적 실존주의의 실천적 표현.'},
  {year:1960,era:'existentialism',cat:'korea',title:'4.19 혁명',desc:'학생·시민 주도의 민주화. 이승만 독재 종식. 한국 민주주의의 첫 승리.'},
  {year:1961,era:'existentialism',cat:'korea',title:'5.16 군사쿠데타',desc:'박정희 집권. 경제개발 우선. 권위주의 통치. 산업화와 근대화의 빛과 그림자.'},
  {year:1961,era:'existentialism',cat:'art',title:'조세프 헬러 《캐치-22》',desc:'군대의 부조리 풍자. 의미 없는 규칙이 지배하는 세계. 탈출 불가능한 역설.'},
  {year:1962,era:'existentialism',cat:'religion',title:'제2차 바티칸 공의회',desc:'현대 세계와의 대화 강조. 실존주의·세속화 도전에 대한 가톨릭의 개방적 응전.'},
  {year:1963,era:'existentialism',cat:'history',title:'케네디 암살',desc:'이상주의에 대한 환멸. 허무주의 감정 심화. 미국 사회의 실존적 위기.'},
  {year:1966,era:'existentialism',cat:'religion',title:'타임지 "신은 죽었는가?" 표지',desc:'신의 죽음 신학(Death of God). 기독교 내부의 자기 부정. 실존주의와 허무주의의 신학적 합류.'},
  {year:1968,era:'existentialism',cat:'history',title:'68혁명·베트남 반전운동',desc:'권위·체제·도덕 전반에 대한 거부. 실존주의적 자유 개념의 정치화.'},
  {year:1969,era:'existentialism',cat:'art',title:'베케트 《숨소리》 (Breath)',desc:'35초짜리 작품. 쓰레기 더미 위 숨소리만. "삶이란 숨소리에 불과하다." 허무주의 예술의 극한.'},
  {year:1970,era:'existentialism',cat:'korea',title:'전태일 분신',desc:'노동자 인권 선언. 사회 부조리에 대한 실존적 항거. 한국 노동운동과 인권운동의 기점.'},
  {year:1938,era:'existentialism',cat:'korea',title:'신사참배 결의 (조선예수교장로회 총회)',desc:'일제의 압박에 굴복, 총회에서 신사참배를 "종교의식이 아닌 국민의례"로 규정하고 결의. 주기철 목사 등 항거. 한국 교회의 친일과 저항의 갈림길. 이후 교단 분열의 역사적 뿌리.'},
  {year:1948,era:'existentialism',cat:'religion',title:'WCC(세계교회협의회) 창설',desc:'암스테르담에서 창설. 에큐메니칼 운동의 제도화. 한국 예장통합·기장 등 참여. 이후 에큐메니즘 논쟁이 한국 교단 분열의 핵심 이슈가 됨.'},
  {year:1953,era:'existentialism',cat:'korea',title:'한국기독교장로회(기장) 출범',desc:'WCC 가입과 김재준 목사 성경관 논쟁으로 예장에서 분리. 에큐메니칼·진보적 신학 노선. 한국 교단 분열의 첫 번째 공식적 분리. 보수-진보의 신학적 갈등 구체화.'},

const ERA_ORDER = ['theism','deism','naturalism','nihilism','existentialism','pantheism','newage','postmodern'];
let activeWV = 'all';
let activeCats = new Set(Object.keys(CAT));

function buildControls() {
  // worldview pills
  const wvRow = document.getElementById('wvRow');
  Object.entries(WV).forEach(([k,v]) => {
    const btn = document.createElement('span');
    btn.className = 'wv-pill' + (k === activeWV ? ' active' : '');
    btn.textContent = v.label;
    btn.style.color = k === 'all' ? '#555' : v.color;
    btn.style.background = k === 'all' ? '#f0f0f0' : v.bg;
    btn.onclick = () => { activeWV = k; render(); buildControls(); };
    wvRow.appendChild(btn);
  });
  // category buttons
  const catRow = document.getElementById('catRow');
  Object.entries(CAT).forEach(([k,v]) => {
    const btn = document.createElement('span');
    btn.className = 'cat-btn' + (activeCats.has(k) ? ' active' : '');
    btn.textContent = v.label;
    btn.style.color = v.color;
    btn.style.background = activeCats.has(k) ? v.bg : '#f5f5f5';
    btn.onclick = () => {
      if (activeCats.has(k)) { if (activeCats.size > 1) activeCats.delete(k); }
      else activeCats.add(k);
      render(); buildControls();
    };
    catRow.appendChild(btn);
  });
}

function render() {
  document.getElementById('wvRow').innerHTML = '';
  document.getElementById('catRow').innerHTML = '';
  buildControls();

  // worldview info
  const info = document.getElementById('wvInfo');
  if (activeWV !== 'all') {
    const v = WV[activeWV];
    info.className = 'wv-info show';
    info.style.background = v.bg;
    info.style.borderColor = v.color;
    info.innerHTML = `<div class="wi-title" style="color:${v.color}">${v.label}</div>
      <div class="wi-period">📅 시기: ${v.period}</div>
      <div>${v.desc}</div>
      <div class="wi-figures">🧑‍🎓 대표 인물: ${v.figures}</div>
      <div class="wi-quote">${v.quote}</div>`;
  } else {
    info.className = 'wv-info';
  }

  // filter events
  const filtered = EVENTS.filter(e =>
    (activeWV === 'all' || e.era === activeWV) && activeCats.has(e.cat)
  ).sort((a,b) => a.year - b.year);

  // stats
  document.getElementById('stats').innerHTML =
    `<b>${filtered.length}</b>개 이벤트 표시 중 (전체 ${EVENTS.length}개)`;

  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  if (filtered.length === 0) {
    tl.innerHTML = '<div class="empty">선택한 조건에 해당하는 이벤트가 없습니다.</div>';
    return;
  }

  // group by era (in order)
  const eraOrder = activeWV === 'all' ? ERA_ORDER : [activeWV];
  const byEra = {};
  eraOrder.forEach(e => byEra[e] = []);
  filtered.forEach(ev => { if (byEra[ev.era]) byEra[ev.era].push(ev); });

  eraOrder.forEach(era => {
    const evs = byEra[era];
    if (!evs || evs.length === 0) return;
    const v = WV[era];
    // phase header
    const ph = document.createElement('div');
    ph.className = 'phase-hdr';
    ph.innerHTML = `<div class="dot" style="background:${v.color};color:${v.color}"></div>
      <div class="label" style="background:${v.color}">${v.label}</div>
      <div style="font-size:11px;color:#999">${v.period}</div>`;
    tl.appendChild(ph);
    // events
    evs.forEach(ev => {
      const cv = CAT[ev.cat];
      const entry = document.createElement('div');
      entry.className = 'entry';
      entry.innerHTML = `
        <div class="year-col">${ev.year}</div>
        <div class="dot-col">
          <div class="edot" style="background:${v.color};color:${v.color}"></div>
          <div class="line"></div>
        </div>
        <div class="card" style="border-left-color:${v.color}" onclick="this.classList.toggle('open')">
          <div class="card-top">
            <span class="cat-badge" style="background:${cv.bg};color:${cv.color}">${cv.label}</span>
            <span class="title">${ev.title}</span>
          </div>
          <div class="desc">${ev.desc}</div>
          <div class="toggle">▼ 자세히 보기</div>
        </div>`;
      tl.appendChild(entry);
    });
  });
}

window.onload = () => { buildControls(); render(); };

</script>
</body>
</html>
